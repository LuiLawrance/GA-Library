<div class="inv-page" id="inv-page">

    <!-- ── Bin grid view ── -->
    <div class="inv-bins-view" id="inv-bins-view">
        <div class="inv-bins-header">
            <div>
                <span class="inv-label">Inventory</span>
                <span class="inv-subtitle" id="inv-bin-subtitle">Loading...</span>
            </div>
        </div>
        <div class="inv-bins-grid" id="inv-bins-grid"></div>
    </div>

    <!-- ── Bin detail view ── -->
    <div class="inv-detail-view hidden" id="inv-detail-view">
        <div class="inv-detail-header">
            <div class="inv-detail-back" onclick="closeBinDetail()">
                <span class="inv-back-arrow">←</span>
                <span>Inventory</span>
            </div>
            <div class="inv-detail-title-row">
                <div>
                    <div class="inv-detail-name" id="detail-bin-name"></div>
                    <div class="inv-detail-meta" id="detail-bin-meta"></div>
                </div>
                <div class="inv-detail-header-right">
                    <div class="inv-detail-counts" id="detail-bin-counts"></div>
                    <div class="inv-detail-controls">
                        <button class="inv-detail-add-btn" onclick="openAddModal()" title="Add card">+</button>
                        <input autocomplete="off" class="inv-detail-search" id="inv-card-filter"
                               oninput="filterBinCards(this.value)" placeholder="Search cards..."
                               type="text">
                        <div class="inv-filter-dropdown-wrap">
                            <button class="inv-filter-dropdown-btn" id="inv-filter-btn"
                                    onclick="toggleFilterDropdown()">
                                <span id="inv-filter-label">Filter &amp; Sort</span>
                                <span class="inv-filter-arrow">&#8249;</span>
                            </button>
                            <div class="inv-filter-menu hidden" id="inv-filter-menu">
                                <div class="inv-filter-section">
                                    <div class="inv-filter-section-label">Sort</div>
                                    <div class="inv-filter-options" id="inv-filter-sort-options"></div>
                                </div>
                                <div class="inv-filter-section">
                                    <div class="inv-filter-section-label">Set</div>
                                    <div class="inv-filter-options" id="inv-filter-set-options"></div>
                                </div>
                                <div class="inv-filter-section">
                                    <div class="inv-filter-section-label">Element</div>
                                    <div class="inv-filter-options" id="inv-filter-element-options"></div>
                                </div>
                                <div class="inv-filter-section">
                                    <div class="inv-filter-section-label">Rarity</div>
                                    <div class="inv-filter-options" id="inv-filter-rarity-options"></div>
                                </div>
                                <div class="inv-filter-section">
                                    <div class="inv-filter-section-label">Foil</div>
                                    <div class="inv-filter-options" id="inv-filter-foil-options"></div>
                                </div>
                                <button class="inv-filter-clear-btn" onclick="clearBinFilters()">Clear all</button>
                            </div>
                        </div>
                        <button class="inv-settings-btn" onclick="openBinSettings()" title="Bin settings">⚙</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="inv-cards-body">
            <div class="inv-qty-confirm-bar hidden" id="inv-qty-confirm-bar">
                <span class="inv-qty-confirm-msg" id="inv-qty-confirm-msg">Update quantity?</span>
                <div class="inv-qty-confirm-actions">
                    <button class="inv-qty-confirm-btn inv-qty-confirm-apply" onclick="applyQtyChange()">Apply</button>
                    <button class="inv-qty-confirm-btn inv-qty-confirm-discard" onclick="discardQtyChange()">Discard
                    </button>
                </div>
            </div>
            <div class="card-drawer hidden" id="inv-card-drawer">
                <div class="drawer-inner">
                    <div id="inv-drawer-content"></div>
                </div>
            </div>
            <div class="drawer-sidebar hidden" id="inv-drawer-sidebar">
                <button class="drawer-sidebar-close" onclick="closeInvDrawer()">&#x2715;</button>
                <div class="drawer-sidebar-divider"></div>
                <button class="drawer-sidebar-btn active" data-tab="info"
                        onclick="switchDrawerTab('info', 'inv-card-drawer')" title="Info">ℹ️
                </button>
                <button class="drawer-sidebar-btn" data-tab="thema"
                        onclick="switchDrawerTab('thema', 'inv-card-drawer')" title="Thema">🏷️
                </button>
            </div>
            <div class="inv-card-grid-wrap">
                <div class="inv-card-grid" id="inv-card-grid"></div>
            </div>
        </div>
    </div>

</div>

<!-- ── Bin context menu ── -->
<div class="inv-context-menu hidden" id="inv-bin-context-menu">
    <button class="inv-context-item" id="ctx-set-default" onclick="ctxSetDefault()">
        <span class="inv-context-icon">★</span> Set as Default
    </button>
    <button class="inv-context-item" onclick="ctxRename()">
        <span class="inv-context-icon">✎</span> Rename
    </button>
    <button class="inv-context-item" onclick="ctxEditDesc()">
        <span class="inv-context-icon">≡</span> Edit Description
    </button>
    <div class="inv-context-divider"></div>
    <button class="inv-context-item inv-context-item-danger" id="ctx-delete" onclick="ctxDelete()">
        <span class="inv-context-icon">✕</span> Delete Bin
    </button>
</div>

<!-- ── Card context menu ── -->
<div class="inv-context-menu hidden" id="inv-card-context-menu">
    <button class="inv-context-item" onclick="ctxCardMove()">
        <span class="inv-context-icon">⇄</span> Move to Bin
    </button>
</div>

<!-- ── Move card modal ── -->
<div class="inv-modal-overlay hidden" id="inv-move-modal" onclick="closeMoveModal()">
    <div class="inv-modal" onclick="event.stopPropagation()">
        <div class="inv-modal-header">
            <span class="inv-modal-title">Move to Bin</span>
            <button class="inv-modal-close" onclick="closeMoveModal()">✕</button>
        </div>
        <div class="inv-move-card-info" id="move-card-info"></div>
        <div class="inv-move-qty-row">
            <label class="inv-field-label">Quantity to move</label>
            <div class="inv-qty-wrap">
                <button class="inv-qty-btn" onclick="changeMoveQty(-1)">−</button>
                <input class="inv-qty-input" id="move-qty" min="1" placeholder="All" type="number">
                <button class="inv-qty-btn" onclick="changeMoveQty(1)">+</button>
            </div>
        </div>
        <div class="inv-move-bin-list" id="move-bin-list"></div>
        <div class="inv-move-divider"></div>
        <button class="inv-move-new-bin-btn" onclick="ctxMoveToNewBin()">
            <span>+</span> Create new bin &amp; move
        </button>
        <div class="inv-modal-error hidden" id="move-modal-error"></div>
    </div>
</div>

<!-- ── Rename bin modal ── -->
<div class="inv-modal-overlay hidden" id="inv-rename-modal" onclick="closeRenameModal()">
    <div class="inv-modal" onclick="event.stopPropagation()">
        <div class="inv-modal-header">
            <span class="inv-modal-title">Rename Bin</span>
            <button class="inv-modal-close" onclick="closeRenameModal()">✕</button>
        </div>
        <div class="inv-field-group">
            <label class="inv-field-label">Name</label>
            <input class="inv-text-input" id="rename-bin-input" onkeydown="if(event.key==='Enter') submitRenameBin()"
                   type="text">
        </div>
        <div class="inv-modal-error hidden" id="rename-bin-error"></div>
        <button class="inv-modal-submit" onclick="submitRenameBin()">Rename</button>
    </div>
</div>

<!-- ── Edit description modal ── -->
<div class="inv-modal-overlay hidden" id="inv-desc-modal" onclick="closeDescModal()">
    <div class="inv-modal" onclick="event.stopPropagation()">
        <div class="inv-modal-header">
            <span class="inv-modal-title">Edit Description</span>
            <button class="inv-modal-close" onclick="closeDescModal()">✕</button>
        </div>
        <div class="inv-field-group">
            <label class="inv-field-label">Description <span class="inv-optional">(optional)</span></label>
            <input class="inv-text-input" id="desc-bin-input" onkeydown="if(event.key==='Enter') submitDescBin()" placeholder="..."
                   type="text">
        </div>
        <div class="inv-modal-error hidden" id="desc-bin-error"></div>
        <button class="inv-modal-submit" onclick="submitDescBin()">Save</button>
    </div>
</div>

<!-- ── Create bin modal ── -->
<div class="inv-modal-overlay hidden" id="inv-create-modal" onclick="closeCreateModal()">
    <div class="inv-modal" onclick="event.stopPropagation()">
        <div class="inv-modal-header">
            <span class="inv-modal-title">New Bin</span>
            <button class="inv-modal-close" onclick="closeCreateModal()">✕</button>
        </div>
        <div class="inv-modal-fields">
            <div class="inv-field-group">
                <label class="inv-field-label">Name</label>
                <input class="inv-text-input" id="create-bin-name" onkeydown="if(event.key==='Enter') submitCreateBin()"
                       placeholder="e.g. Trade Box, Binder 1..."
                       type="text">
            </div>
            <div class="inv-field-group">
                <label class="inv-field-label">Description <span class="inv-optional">(optional)</span></label>
                <input class="inv-text-input" id="create-bin-desc" placeholder="..." type="text">
            </div>
        </div>
        <div class="inv-modal-error hidden" id="create-bin-error"></div>
        <button class="inv-modal-submit" onclick="submitCreateBin()">Create Bin</button>
    </div>
</div>

<!-- ── Bin settings modal ── -->
<div class="inv-modal-overlay hidden" id="inv-settings-modal" onclick="closeBinSettings()">
    <div class="inv-modal" onclick="event.stopPropagation()">
        <div class="inv-modal-header">
            <span class="inv-modal-title">Bin Settings</span>
            <button class="inv-modal-close" onclick="closeBinSettings()">✕</button>
        </div>
        <div class="inv-modal-fields">
            <div class="inv-field-group">
                <label class="inv-field-label">Name</label>
                <input class="inv-text-input" id="settings-bin-name" type="text">
            </div>
            <div class="inv-field-group">
                <label class="inv-field-label">Description</label>
                <input class="inv-text-input" id="settings-bin-desc" placeholder="..." type="text">
            </div>
        </div>
        <div class="inv-modal-error hidden" id="settings-bin-error"></div>
        <div class="inv-modal-actions">
            <button class="inv-modal-submit" onclick="submitBinSettings()">Save</button>
            <button class="inv-btn-make-default" id="settings-default-btn" onclick="settingsSetDefault()">Make Default
            </button>
            <button class="inv-modal-danger" id="settings-delete-btn" onclick="deleteBin()">Delete Bin</button>
        </div>
    </div>
</div>

<!-- ── Add card modal ── -->
<div class="inv-modal-overlay hidden" id="inv-add-modal" onclick="closeAddModal()">
    <div class="inv-modal inv-modal-wide" onclick="event.stopPropagation()">
        <div class="inv-modal-header inv-add-modal-header">
            <button class="inv-btn-back-arrow hidden" id="add-back-btn" onclick="backToSearch()">‹</button>
            <span class="inv-modal-title">Add Card</span>
            <button class="inv-modal-close" onclick="closeAddModal()">✕</button>
        </div>

        <!-- Search step -->
        <div id="add-step-search">
            <div class="inv-add-search-wrap">
                <div class="autocomplete-wrap" style="flex:1">
                    <input autocomplete="off" class="inv-text-input" id="add-card-search"
                           oninput="fetchAddCardSuggestions(this.value)"
                           onkeydown="handleAddCardKeydown(event)"
                           placeholder="Search cards..."
                           type="text">
                    <div class="autocomplete-list hidden" id="add-card-autocomplete"></div>
                </div>
                <button class="btn-search" onclick="searchAddCards()">Search</button>
            </div>
            <div class="inv-add-results" id="add-card-results">
                <div class="inv-search-placeholder" style="padding:30px 0">
                    <span class="inv-empty-icon">⬡</span>
                    <p>Search for a card to add it.</p>
                </div>
            </div>
        </div>

        <!-- Foil + qty step (hidden until card selected) -->
        <div class="hidden" id="add-step-foil">
            <div class="inv-foil-step-body">
                <img alt="" class="inv-modal-img-large" id="add-modal-img" src="">
                <div class="inv-foil-step-right">
                    <div class="inv-foil-step-top">
                        <div>
                            <div class="inv-modal-title" id="add-modal-name"></div>
                            <div class="inv-modal-set" id="add-modal-set"></div>
                        </div>
                        <div class="inv-modal-foils" id="add-modal-foils"></div>
                    </div>
                    <div class="inv-foil-step-bottom">
                        <div class="inv-modal-qty-row">
                            <label class="inv-field-label">Quantity</label>
                            <div class="inv-qty-wrap">
                                <button class="inv-qty-btn" onclick="changeAddQty(-1)">−</button>
                                <input class="inv-qty-input" id="add-modal-qty" max="999" min="1" type="number"
                                       value="1">
                                <button class="inv-qty-btn" onclick="changeAddQty(1)">+</button>
                            </div>
                        </div>
                        <button class="inv-modal-submit" disabled id="add-modal-submit" onclick="submitAddCard()">
                            Add to Bin
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ── Card detail modal (click on existing card) ── -->
<div class="inv-modal-overlay hidden" id="inv-card-modal" onclick="closeCardModal()">
    <div class="inv-modal inv-modal-wide" onclick="event.stopPropagation()">
        <div class="inv-modal-header">
            <div>
                <div class="inv-modal-title" id="card-modal-name"></div>
                <div class="inv-modal-set" id="card-modal-set"></div>
            </div>
            <button class="inv-modal-close" onclick="closeCardModal()">✕</button>
        </div>
        <div class="inv-add-card-preview">
            <img alt="" class="inv-modal-img" id="card-modal-img" src="">
            <div class="inv-add-card-detail">
                <div class="inv-field-group">
                    <label class="inv-field-label">Foil Type</label>
                    <div class="inv-card-modal-foil" id="card-modal-foil"></div>
                </div>
                <div class="inv-field-group">
                    <label class="inv-field-label">Quantity</label>
                    <div class="inv-qty-wrap">
                        <button class="inv-qty-btn" onclick="changeCardModalQty(-1)">−</button>
                        <input class="inv-qty-input" id="card-modal-qty" max="999" min="0" type="number" value="1">
                        <button class="inv-qty-btn" onclick="changeCardModalQty(1)">+</button>
                    </div>
                </div>
                <div class="inv-card-modal-hint">Set quantity to 0 to remove.</div>
            </div>
        </div>
        <div class="inv-modal-actions">
            <button class="inv-modal-submit" onclick="saveCardModal()">Save</button>
            <button class="inv-modal-danger" onclick="removeCardModal()">Remove</button>
        </div>
    </div>
</div>
