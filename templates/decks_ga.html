<div class="dga-page" id="dga-page">

    <!-- ── Deck list view ── -->
    <div class="dga-list-view" id="dga-list-view">
        <div class="dga-header">
            <div>
                <span class="dga-label">My Decks</span>
                <span class="dga-subtitle" id="dga-subtitle">Loading...</span>
            </div>
            <button class="dga-create-btn" onclick="openCreateDeckModal()">+ New Deck</button>
        </div>
        <div class="dga-deck-grid" id="dga-deck-grid"></div>
    </div>

    <!-- ── Deck detail view ── -->
    <div class="dga-detail-view hidden" id="dga-detail-view">
        <div class="dga-detail-header">
            <div class="dga-detail-back" onclick="closeDeckDetail()">
                <span class="dga-back-arrow">←</span>
                <span>My Decks</span>
            </div>
            <div class="dga-detail-title-row">
                <div>
                    <div class="dga-detail-title-wrap">
                        <span class="dga-detail-name" id="dga-detail-name"></span>
                        <span class="dga-detail-format" id="dga-detail-format"></span>
                    </div>
                    <div class="dga-detail-meta" id="dga-detail-desc"></div>
                </div>
                <div class="dga-detail-header-right">
                    <div class="dga-detail-counts" id="dga-detail-counts"></div>
                    <div class="inv-detail-controls">
                        <button class="inv-detail-add-btn" onclick="openDeckAddModal()" title="Add card">+</button>
                        <button class="inv-settings-btn" onclick="openDeckSettingsModal()" title="Deck settings">⚙
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="dga-card-grid-wrap">
            <div class="dga-card-grid" id="dga-card-grid"></div>
        </div>
    </div>

    <!-- ── Create deck modal ── -->
    <div class="inv-modal-overlay hidden" id="dga-create-modal" onclick="closeCreateDeckModal()">
        <div class="inv-modal" onclick="event.stopPropagation()">
            <div class="inv-modal-header">
                <span class="inv-modal-title">New Deck</span>
                <button class="inv-modal-close" onclick="closeCreateDeckModal()">✕</button>
            </div>
            <div class="inv-modal-fields">
                <div class="inv-field-group">
                    <label class="inv-field-label">Name</label>
                    <input class="inv-text-input" id="dga-create-name" onkeydown="if(event.key==='Enter') submitCreateDeck()" placeholder="Deck name"
                           type="text">
                </div>
                <div class="inv-field-group">
                    <label class="inv-field-label">Format</label>
                    <div class="dga-fmt-dropdown-wrap">
                        <button class="dga-fmt-dropdown-btn" id="dga-create-format-btn" onclick="toggleDgaFormatDropdown('create')"
                                type="button">
                            <span id="dga-create-format-label">None</span>
                            <span class="dga-fmt-dropdown-arrow">&#8249;</span>
                        </button>
                        <div class="dga-fmt-dropdown-menu hidden" id="dga-create-format-menu">
                            <div class="dga-fmt-dropdown-option selected" data-value="">None</div>
                            <div class="dga-fmt-dropdown-option" data-value="Standard">Standard</div>
                            <div class="dga-fmt-dropdown-option" data-value="Draft">Draft</div>
                            <div class="dga-fmt-dropdown-option" data-value="Pantheon">Pantheon</div>
                        </div>
                        <input id="dga-create-format" type="hidden" value="">
                    </div>
                </div>
                <div class="inv-field-group">
                    <label class="inv-field-label">Description <span class="inv-optional">(optional)</span></label>
                    <input class="inv-text-input" id="dga-create-desc" maxlength="100" placeholder="..." type="text">
                </div>
            </div>
            <div class="inv-modal-error hidden" id="dga-create-error"></div>
            <button class="inv-modal-submit" onclick="submitCreateDeck()">Create Deck</button>
        </div>
    </div>

    <!-- ── Deck settings modal ── -->
    <div class="inv-modal-overlay hidden" id="dga-settings-modal" onclick="closeDeckSettingsModal()">
        <div class="inv-modal" onclick="event.stopPropagation()">
            <div class="inv-modal-header">
                <span class="inv-modal-title">Deck Settings</span>
                <button class="inv-modal-close" onclick="closeDeckSettingsModal()">✕</button>
            </div>
            <div class="inv-modal-fields">
                <div class="inv-field-group">
                    <label class="inv-field-label">Name</label>
                    <input class="inv-text-input" id="dga-settings-name" type="text">
                </div>
                <div class="inv-field-group">
                    <label class="inv-field-label">Format</label>
                    <div class="dga-fmt-dropdown-wrap">
                        <button class="dga-fmt-dropdown-btn" id="dga-settings-format-btn" onclick="toggleDgaFormatDropdown('settings')"
                                type="button">
                            <span id="dga-settings-format-label">None</span>
                            <span class="dga-fmt-dropdown-arrow">&#8249;</span>
                        </button>
                        <div class="dga-fmt-dropdown-menu hidden" id="dga-settings-format-menu">
                            <div class="dga-fmt-dropdown-option selected" data-value="">None</div>
                            <div class="dga-fmt-dropdown-option" data-value="Standard">Standard</div>
                            <div class="dga-fmt-dropdown-option" data-value="Draft">Draft</div>
                            <div class="dga-fmt-dropdown-option" data-value="Pantheon">Pantheon</div>
                        </div>
                        <input id="dga-settings-format" type="hidden" value="">
                    </div>
                </div>
                <div class="inv-field-group">
                    <label class="inv-field-label">Description</label>
                    <input class="inv-text-input" id="dga-settings-desc" maxlength="100" placeholder="..." type="text">
                </div>
            </div>
            <div class="inv-modal-error hidden" id="dga-settings-error"></div>
            <div class="inv-modal-actions">
                <button class="inv-modal-submit" onclick="submitDeckSettings()">Save</button>
                <button class="inv-modal-danger" onclick="submitDeleteDeck()">Delete Deck</button>
            </div>
            <button class="inv-settings-import-export-btn"
                    onclick="closeDeckSettingsModal(); dgaOpenImportExportModal()">⇅ Import / Export
            </button>
        </div>
    </div>

    <!-- ── Add card modal — simplified (no foil step) ── -->
    <div class="inv-modal-overlay hidden" id="dga-add-modal" onclick="closeDeckAddModal()">
        <div class="inv-modal inv-modal-wide" onclick="event.stopPropagation()">
            <div class="inv-modal-header inv-add-modal-header">
                <button class="inv-btn-back-arrow hidden" id="dga-add-back-btn" onclick="dgaBackToSearch()">‹</button>
                <span class="inv-modal-title">Add Card</span>
                <button class="inv-modal-close" onclick="closeDeckAddModal()">✕</button>
            </div>

            <!-- Search step -->
            <div id="dga-add-step-search">
                <div class="inv-add-search-wrap">
                    <div class="autocomplete-wrap" style="flex:1">
                        <input autocomplete="off" class="inv-text-input" id="dga-add-card-search"
                               oninput="fetchDgaAddCardSuggestions(this.value)"
                               onkeydown="handleDgaAddCardKeydown(event)"
                               placeholder="Search cards..."
                               type="text">
                        <div class="autocomplete-list hidden" id="dga-add-card-autocomplete"></div>
                    </div>
                    <button class="btn-search" onclick="searchDgaAddCards()">Search</button>
                </div>
                <div class="inv-add-results" id="dga-add-card-results">
                    <div class="inv-search-placeholder" style="padding:30px 0">
                        <span class="inv-empty-icon">⬡</span>
                        <p>Search for a card to add it.</p>
                    </div>
                </div>
            </div>

            <!-- Confirm step: card selected, choose section + qty ── -->
            <div class="hidden" id="dga-add-step-confirm">
                <div class="dga-confirm-step">
                    <img alt="" class="inv-modal-img-large" id="dga-add-modal-img" src="">
                    <div class="dga-confirm-right">
                        <div class="inv-modal-title" id="dga-add-modal-name"></div>
                        <div class="inv-modal-qty-row" style="margin-top:16px">
                            <label class="inv-field-label">Section</label>
                            <div class="dga-fmt-dropdown-wrap" style="margin-top:6px">
                                <button class="dga-fmt-dropdown-btn" id="dga-add-section-btn" onclick="toggleDgaAddSectionDropdown()"
                                        type="button">
                                    <span id="dga-add-section-label">Main Deck</span>
                                    <span class="dga-fmt-dropdown-arrow">&#8249;</span>
                                </button>
                                <div class="dga-fmt-dropdown-menu hidden" id="dga-add-section-menu"></div>
                                <input id="dga-add-section" type="hidden" value="Main Deck">
                            </div>
                        </div>
                        <div class="inv-modal-qty-row" style="margin-top:16px">
                            <label class="inv-field-label">Quantity</label>
                            <div class="inv-qty-wrap" style="margin-top:6px">
                                <button class="inv-qty-btn" onclick="changeDgaAddQty(-1)">−</button>
                                <input class="inv-qty-input" id="dga-add-modal-qty" max="999" min="1" type="number"
                                       value="1">
                                <button class="inv-qty-btn" onclick="changeDgaAddQty(1)">+</button>
                            </div>
                        </div>
                        <button class="inv-modal-submit" id="dga-add-modal-submit" onclick="submitDgaAddCard()"
                                style="margin-top:20px">
                            Add to Deck
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- ── Import / Export modal ── -->
    <div class="inv-modal-overlay hidden" id="dga-import-export-modal" onclick="dgaCloseImportExportModal()">
        <div class="inv-modal inv-modal-import-export" onclick="event.stopPropagation()">
            <div class="inv-modal-header">
                <div>
                    <div class="inv-modal-title">Import / Export</div>
                    <div class="inv-modal-set" id="dga-import-export-deck-label"></div>
                </div>
                <button class="inv-modal-close" onclick="dgaCloseImportExportModal()">✕</button>
            </div>
            <div class="inv-import-export-tabs">
                <button class="inv-import-export-tab active" id="dga-import-tab-btn"
                        onclick="dgaSwitchImportExportTab('import')">Import
                </button>
                <button class="inv-import-export-tab" id="dga-export-tab-btn"
                        onclick="dgaSwitchImportExportTab('export')">Export
                </button>
            </div>
            <div id="dga-import-panel">
                <div class="inv-label" style="margin-bottom:6px;">Paste your list below</div>
                <div class="inv-import-format-hint">Format: <code># Section Name</code> then <code>1 Card Name</code>
                    per line
                </div>
                <div class="inv-textarea-wrap">
                    <textarea class="inv-import-textarea" id="dga-import-textarea"
                              placeholder="# Material Deck&#10;1 Spirit of Fortuitous Fire&#10;# Main Deck&#10;1 Academy Guide"></textarea>
                </div>
                <div class="inv-import-results hidden" id="dga-import-results"></div>
                <button class="inv-modal-submit" id="dga-import-submit-btn" onclick="dgaSubmitImport()">Import</button>
            </div>
            <div class="hidden" id="dga-export-panel">
                <div class="inv-label" style="margin-bottom:6px;">Copy your list below</div>
                <div class="inv-textarea-wrap">
                    <textarea class="inv-import-textarea" id="dga-export-textarea" readonly></textarea>
                </div>
                <button class="inv-modal-submit" id="dga-export-copy-btn" onclick="dgaCopyExport()">Copy to Clipboard
                </button>
            </div>
        </div>
    </div>

    <!-- ── Add section modal ── -->
    <div class="inv-modal-overlay hidden" id="dga-add-section-modal" onclick="closeAddSectionModal()">
        <div class="inv-modal" onclick="event.stopPropagation()">
            <div class="inv-modal-header">
                <span class="inv-modal-title">New Section</span>
                <button class="inv-modal-close" onclick="closeAddSectionModal()">✕</button>
            </div>
            <div class="inv-modal-fields">
                <div class="inv-field-group">
                    <label class="inv-field-label">Section Name</label>
                    <input class="inv-text-input" id="dga-add-section-input" onkeydown="if(event.key==='Enter') submitAddSectionModal(); if(event.key==='Escape') closeAddSectionModal();" placeholder="e.g. Side Deck"
                           type="text">
                </div>
            </div>
            <div class="inv-modal-error hidden" id="dga-add-section-error"></div>
            <div class="inv-modal-actions">
                <button class="inv-modal-submit" onclick="submitAddSectionModal()">Add Section</button>
            </div>
        </div>
    </div>

</div>
