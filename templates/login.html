<div class="login-wrap">
    <div class="login-card">
        <div class="login-header">
            <span class="login-label">GA Library</span>
            <h1 class="login-title" id="form-title">Sign in</h1>
        </div>

        <div id="error-msg" class="error-msg"></div>

        <div class="form-fields">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password"
                       autocomplete="current-password">
            </div>
            <div class="form-group" id="confirm-group" style="display:none;">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm password">
            </div>
        </div>

        <button class="btn-submit" id="submit-btn" onclick="handleSubmit()">Sign in</button>

        <div class="form-switch">
            <span id="switch-text">Don't have an account?</span>
            <button class="btn-switch" onclick="toggleMode()">Create account</button>
        </div>
    </div>
</div>
