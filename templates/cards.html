<div class="page-header cards-header">
    <div class="cards-header-left">
        <div class="default-bin-wrap hidden" id="default-bin-wrap">
            <button class="default-bin-btn" id="default-bin-btn" onclick="openDefaultBinPicker()">
                <span class="default-bin-icon">📦</span>
                <span id="default-bin-label">Default Bin</span>
            </button>
            <div class="default-bin-menu hidden" id="default-bin-menu"></div>
        </div>
    </div>
    <div class="search-wrap">
        <div class="set-dropdown-wrap">
            <button class="set-dropdown-btn" onclick="toggleSetDropdown()">
                <span id="set-dropdown-label">Sets</span>
                <span class="set-dropdown-arrow">&#8249;</span>
            </button>
            <div class="set-dropdown-menu hidden" id="set-dropdown-menu">
                <div id="set-dropdown-options"></div>
            </div>
        </div>
        <div class="autocomplete-wrap">
            <input autocomplete="off" id="card-search" oninput="fetchSuggestions(this.value)"
                   onkeydown="handleCardKeydown(event)"
                   placeholder="Search cards..."
                   type="text">
            <div class="autocomplete-list hidden" id="autocomplete-list"></div>
        </div>
        <button class="btn-search" onclick="searchCards()">Search</button>
        <div class="cards-filter-wrap">
            <button class="cards-filter-btn" id="cards-filter-btn" onclick="toggleCardsFilter()">
                <span id="cards-filter-label">Filter</span>
                <span class="cards-filter-arrow">&#8249;</span>
            </button>
            <div class="cards-filter-menu hidden" id="cards-filter-menu">
                <div class="cards-filter-section">
                    <div class="cards-filter-section-label">Sort</div>
                    <div class="cards-filter-options" id="cards-filter-sort-options"></div>
                </div>
                <div class="cards-filter-section">
                    <div class="cards-filter-section-label">Element</div>
                    <div class="cards-filter-options" id="cards-filter-element-options"></div>
                </div>
                <div class="cards-filter-section">
                    <div class="cards-filter-section-label">Rarity</div>
                    <div class="cards-filter-options" id="cards-filter-rarity-options"></div>
                </div>
                <button class="cards-filter-clear-btn" onclick="clearCardsFilters()">Clear all</button>
            </div>
        </div>
    </div>
</div>

<div class="cards-set-progress-wrap hidden" id="cards-set-progress-wrap"></div>

<div class="cards-body">
    <div class="inv-qty-confirm-bar hidden" id="cards-qty-confirm-bar">
        <span class="inv-qty-confirm-msg">Confirm changes?</span>
        <div class="inv-qty-confirm-actions">
            <button class="inv-qty-confirm-btn inv-qty-confirm-apply" onclick="cardsEditMode.apply()">Apply</button>
            <button class="inv-qty-confirm-btn inv-qty-confirm-discard" onclick="cardsEditMode.discard()">Discard
            </button>
        </div>
    </div>
    <div class="card-drawer hidden" id="card-drawer">
        <div class="drawer-inner">
            <div id="drawer-content"></div>
        </div>
    </div>
    <div class="drawer-sidebar hidden" id="drawer-sidebar">
        <button class="drawer-sidebar-close" onclick="closeCardDrawer()">&#x2715;</button>
        <div class="drawer-sidebar-divider"></div>
        <button class="drawer-sidebar-btn active" data-tab="info" onclick="switchDrawerTab('info', 'card-drawer')"
                title="Info">ℹ️
        </button>
        <button class="drawer-sidebar-btn" data-tab="thema" onclick="switchDrawerTab('thema', 'card-drawer')"
                title="Thema">🏷️
        </button>
    </div>
    <div class="card-grid-wrap">
        <div class="card-grid" id="card-results"></div>
    </div>
</div>
