<div class="page-header cards-header">
    <div class="search-wrap">
        <div class="set-dropdown-wrap">
            <button class="set-dropdown-btn" onclick="toggleSetDropdown()">
                <span id="set-dropdown-label">Sets</span>
                <span class="set-dropdown-arrow">&#8249;</span>
            </button>
            <div id="set-dropdown-menu" class="set-dropdown-menu hidden">
                <div id="set-dropdown-options"></div>
            </div>
        </div>
        <div class="autocomplete-wrap">
            <input type="text" id="card-search" placeholder="Search cards..." autocomplete="off"
                onkeydown="handleCardKeydown(event)"
                oninput="fetchSuggestions(this.value)">
            <div id="autocomplete-list" class="autocomplete-list hidden"></div>
        </div>
        <button class="btn-search" onclick="searchCards()">Search</button>
    </div>
</div>

<div class="cards-body">
    <div id="card-drawer" class="card-drawer hidden">
        <div class="drawer-inner">
            <div id="drawer-content"></div>
        </div>
    </div>
    <div class="card-grid-wrap">
        <div id="card-results" class="card-grid"></div>
    </div>
</div>
